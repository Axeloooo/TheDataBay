# Alembic configuration file.
# sqlalchemy.url is intentionally omitted here — env.py reads it from
# app.config.settings so that it picks up the environment variable at runtime.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Maximum number of revision files to search back from HEAD
truncate_slug_length = 40

# Revision branch labels
revision_environment = false

# Output encoding for migration scripts
output_encoding = utf-8

[post_write_hooks]
# no post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
