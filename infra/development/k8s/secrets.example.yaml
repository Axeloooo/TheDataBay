# Example secrets configuration for BridgeMart
# Copy this file to secrets.yaml and fill in actual values
# DO NOT commit secrets.yaml to version control

apiVersion: v1
kind: Secret
metadata:
  name: bridgemart-secrets
type: Opaque
stringData:
  # Database settings
  DATABASE_URL: "mysql+pymysql://SOME_USER:SOME_PASSWORD@mysql-svc:3306/SOME_DATABASE?charset=utf8mb4"
  DATABASE_ROOT_PASSWORD: SOME_ROOT_PASSWORD # Root password for MySQL database
  DATABASE_NAME: SOME_DATABASE # Name of the database to create

  # App settings
  APP_NAME: "BridgeMart API" # Application name
  APP_VERSION: "0.1.0" # Application version
  ENVIRONMENT: "development" # Environment: development, staging, production

  # Server settings
  HOST: "0.0.0.0" # Server host (use 0.0.0.0 for k8s)
  PORT: "8080" # Server port

  # CORS settings
  CORS_ORIGINS: '["http://localhost:5173"]' # Allowed origins for CORS (JSON array as string)

  # Ollama settings
  EMBEDDING_MODEL: "nomic-embed-text" # Ollama embedding model name

  # Embedding job settings
  MAX_FILE_SIZE_MB: "50" # Maximum file size in megabytes
  MAX_DATASET_ROWS: "50000" # Maximum number of rows per dataset
  EMBEDDING_CHUNK_SIZE: "256" # Number of rows per embedding chunk

  # Similarity search settings
  TOP_K: "10" # Number of top similar datasets to return
  K_ROWS: "100" # Number of rows to consider for similarity search
  SIMILARITY_THRESHOLD: "0.75" # Similarity score threshold
  CACHE_MAXSIZE: "100" # Maximum number of embeddings to cache

  # Pinata IPFS settings
  PINATA_API_KEY: "" # Your Pinata API Key
  PINATA_SECRET_KEY: "" # Your Pinata Secret Key
  PINATA_GATEWAY_URL: "https://gateway.pinata.cloud" # Pinata Gateway URL

  # Smart contract settings
  CONTRACT_ADDRESS: "0xYourContractAddressHere" # Your smart contract address
  CONTRACT_ABI_PATH: "/config/Marketplace.json" # Path to mounted contract ABI (from ConfigMap)
  CHAIN_ID: "31337" # Chain ID (31337 for local Anvil)
  RPC_URL: "http://127.0.0.1:8545" # Your Ethereum RPC URL

---
# Usage:
# 1. Copy this file: cp secrets.example.yaml secrets.yaml
# 2. Edit secrets.yaml with your actual values
# 3. Apply to cluster: kubectl apply -f secrets.yaml
