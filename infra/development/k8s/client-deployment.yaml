apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: bridgemart/client
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: client-svc
spec:
  selector:
    app: client
  ports:
    - port: 5173
      targetPort: 5173
