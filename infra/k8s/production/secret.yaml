# DOCUMENTATION ONLY — do not apply this file with kubectl.
#
# The `ip-factory-secrets` Secret is managed exclusively by the CSI Secret
# Store driver via the SecretProviderClass in secret-provider-class.yaml.
# Applying a hand-crafted Secret here would create an empty resource that
# conflicts with (and may shadow) the driver-managed Secret.
#
# Required secrets stored in Azure Key Vault (keys synced by SecretProviderClass):
#   POSTGRES_URL         — postgresql+psycopg://user:pass@postgres:5432/bridgemart
#   POSTGRES_PASSWORD    — Postgres superuser password
#   FRONTEND_URL         — https://chiselware.org
#   JWT_SECRET_KEY
#   INVITE_TOKEN_SECRET
#   TOKEN_ENC_KEY_B64
#   LINKEDIN_CLIENT_ID
#   LINKEDIN_CLIENT_SECRET
#   LINKEDIN_REDIRECT_URI
#   GITHUB_APP_ID
#   GITHUB_ORG
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET
#   GITHUB_REDIRECT_URI
#   SENDGRID_API_KEY
#   EMAIL_FROM
#   STRIPE_SECRET_KEY
#   STRIPE_SUCCESS_URL
#   STRIPE_CANCEL_URL
#   STRIPE_WEBHOOK_SECRET
#   PINATA_API_KEY
#   PINATA_SECRET_KEY
#   CONTRACT_ADDRESS
#   SERVER_PRIVATE_KEY
