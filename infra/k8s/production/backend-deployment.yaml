apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ip-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          # Replace <ACR_LOGIN_SERVER> and <TAG> after terraform apply and docker push
          image: <ACR_LOGIN_SERVER>/ip-factory/api:<TAG>
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ip-factory-config
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: ip-factory-secrets
                  key: POSTGRES_URL
            - name: PINATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ip-factory-secrets
                  key: PINATA_API_KEY
            - name: PINATA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ip-factory-secrets
                  key: PINATA_SECRET_KEY
            - name: SERVER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: ip-factory-secrets
                  key: SERVER_PRIVATE_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ip-factory-secrets-provider
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ip-factory
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
