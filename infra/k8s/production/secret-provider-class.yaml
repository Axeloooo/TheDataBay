apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ip-factory-secrets-provider
  namespace: ip-factory
spec:
  provider: azure
  secretObjects:
    - secretName: ip-factory-secrets
      type: Opaque
      data:
        - objectName: POSTGRES-URL
          key: POSTGRES_URL
        - objectName: FRONTEND-URL
          key: FRONTEND_URL
        - objectName: JWT-SECRET-KEY
          key: JWT_SECRET_KEY
        - objectName: INVITE-TOKEN-SECRET
          key: INVITE_TOKEN_SECRET
        - objectName: TOKEN-ENC-KEY-B64
          key: TOKEN_ENC_KEY_B64
        - objectName: LINKEDIN-CLIENT-ID
          key: LINKEDIN_CLIENT_ID
        - objectName: LINKEDIN-CLIENT-SECRET
          key: LINKEDIN_CLIENT_SECRET
        - objectName: LINKEDIN-REDIRECT-URI
          key: LINKEDIN_REDIRECT_URI
        - objectName: GITHUB-APP-ID
          key: GITHUB_APP_ID
        - objectName: GITHUB-ORG
          key: GITHUB_ORG
        - objectName: GITHUB-CLIENT-ID
          key: GITHUB_CLIENT_ID
        - objectName: GITHUB-CLIENT-SECRET
          key: GITHUB_CLIENT_SECRET
        - objectName: GITHUB-REDIRECT-URI
          key: GITHUB_REDIRECT_URI
        - objectName: SENDGRID-API-KEY
          key: SENDGRID_API_KEY
        - objectName: EMAIL-FROM
          key: EMAIL_FROM
        - objectName: STRIPE-SECRET-KEY
          key: STRIPE_SECRET_KEY
        - objectName: STRIPE-SUCCESS-URL
          key: STRIPE_SUCCESS_URL
        - objectName: STRIPE-CANCEL-URL
          key: STRIPE_CANCEL_URL
        - objectName: STRIPE-WEBHOOK-SECRET
          key: STRIPE_WEBHOOK_SECRET
        - objectName: POSTGRES-PASSWORD
          key: POSTGRES_PASSWORD
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the AKS secrets-provider addon managed identity.
    # Run: az aks show -g <rg> -n <cluster> --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
    userAssignedIdentityID: "<SECRETS_PROVIDER_CLIENT_ID>"
    # Replace with actual Key Vault name after terraform apply
    keyvaultName: "ipfactoryproductionkv"
    # Replace with actual tenant ID
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: POSTGRES-URL
          objectType: secret
        - |
          objectName: FRONTEND-URL
          objectType: secret
        - |
          objectName: JWT-SECRET-KEY
          objectType: secret
        - |
          objectName: INVITE-TOKEN-SECRET
          objectType: secret
        - |
          objectName: TOKEN-ENC-KEY-B64
          objectType: secret
        - |
          objectName: LINKEDIN-CLIENT-ID
          objectType: secret
        - |
          objectName: LINKEDIN-CLIENT-SECRET
          objectType: secret
        - |
          objectName: LINKEDIN-REDIRECT-URI
          objectType: secret
        - |
          objectName: GITHUB-APP-ID
          objectType: secret
        - |
          objectName: GITHUB-ORG
          objectType: secret
        - |
          objectName: GITHUB-CLIENT-ID
          objectType: secret
        - |
          objectName: GITHUB-CLIENT-SECRET
          objectType: secret
        - |
          objectName: GITHUB-REDIRECT-URI
          objectType: secret
        - |
          objectName: SENDGRID-API-KEY
          objectType: secret
        - |
          objectName: EMAIL-FROM
          objectType: secret
        - |
          objectName: STRIPE-SECRET-KEY
          objectType: secret
        - |
          objectName: STRIPE-SUCCESS-URL
          objectType: secret
        - |
          objectName: STRIPE-CANCEL-URL
          objectType: secret
        - |
          objectName: STRIPE-WEBHOOK-SECRET
          objectType: secret
        - |
          objectName: POSTGRES-PASSWORD
          objectType: secret
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ip-factory-github-key-provider
  namespace: ip-factory
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: "ipfactoryproductionkv"
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: GITHUB-APP-PRIVATE-KEY
          objectType: secret
          objectAlias: private-key.pem
