apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: thedatabay-secrets-provider
  namespace: thedatabay
spec:
  provider: azure
  secretObjects:
    - secretName: thedatabay-secrets
      type: Opaque
      data:
        - objectName: APP-NAME
          key: APP_NAME
        - objectName: APP-VERSION
          key: APP_VERSION
        - objectName: ENVIRONMENT
          key: ENVIRONMENT
        - objectName: HOST
          key: HOST
        - objectName: PORT
          key: PORT
        - objectName: CORS-ORIGINS
          key: CORS_ORIGINS
        - objectName: LLM-PROVIDER
          key: LLM_PROVIDER
        - objectName: LLM-BASE-URL
          key: LLM_BASE_URL
        - objectName: LLM-CHAT-MODEL
          key: LLM_CHAT_MODEL
        - objectName: LLM-EMBEDDING-MODEL
          key: LLM_EMBEDDING_MODEL
        - objectName: LLM-EMBEDDING-DIMENSION
          key: LLM_EMBEDDING_DIMENSION
        - objectName: LLM-THINK
          key: LLM_THINK
        - objectName: DATASET-SUMMARY-COUNT
          key: DATASET_SUMMARY_COUNT
        - objectName: DATASET-SUMMARY-SAMPLE-ROWS
          key: DATASET_SUMMARY_SAMPLE_ROWS
        - objectName: MAX-FILE-SIZE-MB
          key: MAX_FILE_SIZE_MB
        - objectName: MAX-DATASET-ROWS
          key: MAX_DATASET_ROWS
        - objectName: TOP-K
          key: TOP_K
        - objectName: SIMILARITY-THRESHOLD
          key: SIMILARITY_THRESHOLD
        - objectName: CACHE-MAXSIZE
          key: CACHE_MAXSIZE
        - objectName: POSTGRES-URL
          key: POSTGRES_URL
        - objectName: PINATA-API-KEY
          key: PINATA_API_KEY
        - objectName: PINATA-SECRET-KEY
          key: PINATA_SECRET_KEY
        - objectName: PINATA-GATEWAY-URL
          key: PINATA_GATEWAY_URL
        - objectName: SERVER-PRIVATE-KEY
          key: SERVER_PRIVATE_KEY
        - objectName: POSTGRES-PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: CONTRACT-ADDRESS
          key: CONTRACT_ADDRESS
        - objectName: PAYMENT-TOKEN-ADDRESS
          key: PAYMENT_TOKEN_ADDRESS
        - objectName: CADC-TOKEN-ADDRESS
          key: CADC_TOKEN_ADDRESS
        - objectName: CONTRACT-ABI-PATH
          key: CONTRACT_ABI_PATH
        - objectName: CHAIN-ID
          key: CHAIN_ID
        - objectName: RPC-URL
          key: RPC_URL
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the AKS secrets-provider addon managed identity.
    # Run: az aks show -g <rg> -n <cluster> --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
    userAssignedIdentityID: "<SECRETS_PROVIDER_CLIENT_ID>"
    # Replace with actual Key Vault name after terraform apply
    keyvaultName: "<KEY_VAULT_NAME>"
    # Replace with actual tenant ID
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: APP-NAME
          objectType: secret
        - |
          objectName: APP-VERSION
          objectType: secret
        - |
          objectName: ENVIRONMENT
          objectType: secret
        - |
          objectName: HOST
          objectType: secret
        - |
          objectName: PORT
          objectType: secret
        - |
          objectName: CORS-ORIGINS
          objectType: secret
        - |
          objectName: LLM-PROVIDER
          objectType: secret
        - |
          objectName: LLM-BASE-URL
          objectType: secret
        - |
          objectName: LLM-CHAT-MODEL
          objectType: secret
        - |
          objectName: LLM-EMBEDDING-MODEL
          objectType: secret
        - |
          objectName: LLM-EMBEDDING-DIMENSION
          objectType: secret
        - |
          objectName: LLM-THINK
          objectType: secret
        - |
          objectName: DATASET-SUMMARY-COUNT
          objectType: secret
        - |
          objectName: DATASET-SUMMARY-SAMPLE-ROWS
          objectType: secret
        - |
          objectName: MAX-FILE-SIZE-MB
          objectType: secret
        - |
          objectName: MAX-DATASET-ROWS
          objectType: secret
        - |
          objectName: TOP-K
          objectType: secret
        - |
          objectName: SIMILARITY-THRESHOLD
          objectType: secret
        - |
          objectName: CACHE-MAXSIZE
          objectType: secret
        - |
          objectName: POSTGRES-URL
          objectType: secret
        - |
          objectName: PINATA-API-KEY
          objectType: secret
        - |
          objectName: PINATA-SECRET-KEY
          objectType: secret
        - |
          objectName: PINATA-GATEWAY-URL
          objectType: secret
        - |
          objectName: SERVER-PRIVATE-KEY
          objectType: secret
        - |
          objectName: POSTGRES-PASSWORD
          objectType: secret
        - |
          objectName: CONTRACT-ADDRESS
          objectType: secret
        - |
          objectName: PAYMENT-TOKEN-ADDRESS
          objectType: secret
        - |
          objectName: CADC-TOKEN-ADDRESS
          objectType: secret
        - |
          objectName: CONTRACT-ABI-PATH
          objectType: secret
        - |
          objectName: CHAIN-ID
          objectType: secret
        - |
          objectName: RPC-URL
          objectType: secret
