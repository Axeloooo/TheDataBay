apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ip-factory-secrets-provider
  namespace: ip-factory
spec:
  provider: azure
  secretObjects:
    - secretName: ip-factory-secrets
      type: Opaque
      data:
        - objectName: POSTGRES-URL
          key: POSTGRES_URL
        - objectName: PINATA-API-KEY
          key: PINATA_API_KEY
        - objectName: PINATA-SECRET-KEY
          key: PINATA_SECRET_KEY
        - objectName: SERVER-PRIVATE-KEY
          key: SERVER_PRIVATE_KEY
        - objectName: POSTGRES-PASSWORD
          key: POSTGRES_PASSWORD
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the AKS secrets-provider addon managed identity.
    # Run: az aks show -g <rg> -n <cluster> --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
    userAssignedIdentityID: "<SECRETS_PROVIDER_CLIENT_ID>"
    # Replace with actual Key Vault name after terraform apply
    keyvaultName: "ipfactoryproductionkv"
    # Replace with actual tenant ID
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: POSTGRES-URL
          objectType: secret
        - |
          objectName: PINATA-API-KEY
          objectType: secret
        - |
          objectName: PINATA-SECRET-KEY
          objectType: secret
        - |
          objectName: SERVER-PRIVATE-KEY
          objectType: secret
        - |
          objectName: POSTGRES-PASSWORD
          objectType: secret
