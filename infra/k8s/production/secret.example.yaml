# DOCUMENTATION ONLY — do not apply this file with kubectl.
#
# The `ulenor-secrets` Secret is managed exclusively by the CSI Secret
# Store driver via the SecretProviderClass in secret-provider-class.yaml.
# Applying a hand-crafted Secret here would create an empty resource that
# conflicts with (and may shadow) the driver-managed Secret.
#
# Required secrets stored in Azure Key Vault (keys synced by SecretProviderClass):
#   APP_NAME                 — Ulenor API
#   APP_VERSION              — 0.1.0
#   ENVIRONMENT              — production
#   HOST                     — 0.0.0.0
#   PORT                     — 8080
#   CORS_ORIGINS             — ["https://ulenor.com"]
#   OLLAMA_HOST              — http://ollama-svc:11434
#   EMBEDDING_MODEL          — nomic-embed-text
#   EMBEDDING_DIMENSION      — 768
#   MAX_FILE_SIZE_MB         — 50
#   MAX_DATASET_ROWS         — 50000
#   EMBEDDING_CHUNK_SIZE     — 256
#   TOP_K                    — 10
#   K_ROWS                   — 100
#   SIMILARITY_THRESHOLD     — 0.30
#   CACHE_MAXSIZE            — 100
#   POSTGRES_URL             — postgresql+psycopg://user:pass@postgres:5432/ulenor
#   POSTGRES_PASSWORD        — Postgres superuser password
#   PINATA_API_KEY
#   PINATA_SECRET_KEY
#   PINATA_GATEWAY_URL       — https://gateway.pinata.cloud
#   CONTRACT_ADDRESS
#   PAYMENT_TOKEN_ADDRESS
#   CADC_TOKEN_ADDRESS
#   CONTRACT_ABI_PATH        — /code/app/contracts/Marketplace.json
#   CHAIN_ID                 — 84532
#   RPC_URL
#   SERVER_PRIVATE_KEY
