# DOCUMENTATION ONLY — do not apply this file with kubectl.
#
# The `thedatabay-secrets` Secret is managed exclusively by the CSI Secret
# Store driver via the SecretProviderClass in secret-provider-class.yaml.
# Applying a hand-crafted Secret here would create an empty resource that
# conflicts with (and may shadow) the driver-managed Secret.
#
# Required secrets stored in Azure Key Vault (keys synced by SecretProviderClass):
#   APP_NAME                 — TheDataBay API
#   APP_VERSION              — 0.1.0
#   ENVIRONMENT              — production
#   HOST                     — 0.0.0.0
#   PORT                     — 8080
#   CORS_ORIGINS             — ["https://thedatabay.com"]
#   LLM_PROVIDER             — ollama
#   LLM_BASE_URL             — http://ollama-svc:11434
#   LLM_CHAT_MODEL           — deepseek-v4-flash:cloud
#   LLM_EMBEDDING_MODEL      — nomic-embed-text
#   LLM_EMBEDDING_DIMENSION  — 768
#   LLM_THINK                — false
#   DATASET_SUMMARY_COUNT    — 5
#   DATASET_SUMMARY_SAMPLE_ROWS — 20
#   MAX_FILE_SIZE_MB         — 50
#   MAX_DATASET_ROWS         — 50000
#   TOP_K                    — 10
#   SIMILARITY_THRESHOLD     — 0.30
#   CACHE_MAXSIZE            — 100
#   POSTGRES_URL             — postgresql+psycopg://user:pass@postgres:5432/thedatabay
#   POSTGRES_PASSWORD        — Postgres superuser password
#   PINATA_API_KEY
#   PINATA_SECRET_KEY
#   PINATA_GATEWAY_URL       — https://gateway.pinata.cloud
#   CONTRACT_ADDRESS
#   USDC_TOKEN_ADDRESS
#   CADC_TOKEN_ADDRESS
#   CONTRACT_ABI_PATH        — /code/app/contracts/Marketplace.json
#   CHAIN_ID                 — 84532
#   RPC_URL
#   SERVER_PRIVATE_KEY
#
# Optional secret stored separately in `thedatabay-optional-secrets`.
# It is mounted into both backend and ollama deployments. Backend uses it for
# direct hosted API calls; ollama uses it when serving `*:cloud` models locally.
#   OLLAMA_API_KEY           — hosted Ollama API key, only when required
