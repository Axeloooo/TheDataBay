apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-model-cache
  namespace: thedatabay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: thedatabay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thedatabay-optional-secrets
                  key: OLLAMA_API_KEY
                  optional: true
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              ollama serve &
              pid="$!"
              until ollama list >/dev/null 2>&1; do
                sleep 2
              done
              ollama pull nomic-embed-text
              wait "$pid"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ollama list | grep -q '^nomic-embed-text'
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.ollama
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ollama-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-svc
  namespace: thedatabay
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
