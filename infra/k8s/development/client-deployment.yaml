apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ulenor/client
          env:
            - name: VITE_API_URL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: API_URL
            - name: VITE_CONTRACT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CONTRACT_ADDRESS
            - name: VITE_PAYMENT_TOKEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PAYMENT_TOKEN_ADDRESS
            - name: VITE_CADC_TOKEN_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CADC_TOKEN_ADDRESS
            - name: VITE_PINATA_GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PINATA_GATEWAY_URL
            - name: VITE_WALLETCONNECT_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: WALLETCONNECT_PROJECT_ID
          resources:
            requests:
              memory: "512Mi"
              cpu: "25m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: client-svc
spec:
  selector:
    app: client
  ports:
    - port: 5173
      targetPort: 5173
  type: ClusterIP
