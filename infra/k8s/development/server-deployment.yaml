apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: ulenor/server
          env:
            # Database settings
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: POSTGRES_URL

            # App settings
            - name: APP_NAME
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: APP_VERSION
            - name: ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: ENVIRONMENT

            # Server settings
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: HOST
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PORT

            # CORS settings
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CORS_ORIGINS

            # Ollama settings
            - name: EMBEDDING_MODEL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: EMBEDDING_MODEL
            - name: OLLAMA_HOST
              value: "http://host.docker.internal:11434"

            # Embedding job settings
            - name: MAX_FILE_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: MAX_FILE_SIZE_MB
            - name: MAX_DATASET_ROWS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: MAX_DATASET_ROWS
            - name: EMBEDDING_CHUNK_SIZE
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: EMBEDDING_CHUNK_SIZE

            # Similarity search settings
            - name: TOP_K
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: TOP_K
            - name: K_ROWS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: K_ROWS
            - name: SIMILARITY_THRESHOLD
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: SIMILARITY_THRESHOLD
            - name: CACHE_MAXSIZE
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CACHE_MAXSIZE

            # Pinata IPFS settings
            - name: PINATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PINATA_API_KEY
            - name: PINATA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PINATA_SECRET_KEY
            - name: PINATA_GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: PINATA_GATEWAY_URL

            # Smart contract settings
            - name: CONTRACT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CONTRACT_ADDRESS
            - name: CONTRACT_ABI_PATH
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CONTRACT_ABI_PATH
            - name: CHAIN_ID
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: CHAIN_ID
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: RPC_URL
            - name: SERVER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: SERVER_PRIVATE_KEY

            # Agent settings
            - name: SEED_AGENTS
              valueFrom:
                secretKeyRef:
                  name: ulenor-secrets
                  key: SEED_AGENTS
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
spec:
  selector:
    app: server
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
